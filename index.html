<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cardiff All Stars FC — Live Scores</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: transparent;
      padding: 8px;
    }

    .cas-widget {
      border-radius: 12px;
      overflow: hidden;
      background: #0a1628;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .cas-widget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: #102040;
      border-bottom: 2px solid #1e3a5f;
    }

    .cas-widget-title {
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .cas-updated {
      font-size: 0.75rem;
      color: #7a9bbf;
    }

    .cas-match {
      border-bottom: 1px solid #1a2f4a;
      padding: 16px 20px;
    }
    .cas-match:last-child { border-bottom: none; }

    .cas-match-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .cas-league {
      font-size: 0.7rem;
      color: #7a9bbf;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .cas-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .cas-badge.cas-live { background: rgba(220,40,40,0.15); color: #ff5555; border: 1px solid #ff555540; }
    .cas-badge.cas-ft   { background: rgba(40,180,100,0.1);  color: #50d090; border: 1px solid #50d09040; }
    .cas-badge.cas-pre  { background: rgba(100,140,200,0.1); color: #88aadd; border: 1px solid #88aadd40; }

    .cas-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ff5555;
      animation: cas-pulse 1.4s ease-in-out infinite;
    }
    @keyframes cas-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .cas-scoreline {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .cas-team {
      flex: 1;
    }
    .cas-team-home { text-align: right; }
    .cas-team-away { text-align: left; }

    .cas-team-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: #e8eef5;
      line-height: 1.2;
    }

    .cas-score {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      background: #102040;
      border-radius: 8px;
      padding: 8px 16px;
      border: 2px solid #1e3a5f;
      min-width: 90px;
      justify-content: center;
    }
    .cas-live .cas-score {
      border-color: rgba(255,85,85,0.4);
      background: rgba(255,85,85,0.06);
    }

    .cas-score-home,
    .cas-score-away {
      font-size: 1.8rem;
      font-weight: 800;
      color: #ffffff;
      line-height: 1;
    }
    .cas-score-sep {
      font-size: 1.4rem;
      color: #3a6080;
    }

    .cas-empty {
      padding: 28px;
      text-align: center;
      color: #4a6a88;
      font-size: 0.9rem;
      background: #0a1628;
      border-radius: 12px;
    }

    @media (max-width: 400px) {
      .cas-team-name { font-size: 0.82rem; }
      .cas-score-home, .cas-score-away { font-size: 1.4rem; }
      .cas-score { padding: 6px 10px; min-width: 72px; }
      .cas-match { padding: 12px 14px; }
    }
  </style>
</head>
<body>
  <div id="cas-livescore"></div>

  <script>
    // ⬇️ Replace this with your Gist raw URL
    const GIST_URL = "https://gist.githubusercontent.com/chunkehdemunkeh-afk/250ca7f539145a1ae3deae88cb5f360e/raw/f0c3d8b64060b3aa2387158cb79c65a211481f5e/scores.json";
    const POLL_MS  = 60000;

    const STATUS_LABELS  = { LIVE: "LIVE", FT: "Full Time", "PRE-MATCH": "Pre-Match" };
    const STATUS_CLASSES = { LIVE: "cas-live", FT: "cas-ft", "PRE-MATCH": "cas-pre" };

    function renderMatch(match) {
      const sc = STATUS_CLASSES[match.status] || "cas-ft";
      const sl = STATUS_LABELS[match.status]  || match.status;
      const isLive = match.status === "LIVE";
      return `
        <div class="cas-match ${sc}">
          <div class="cas-match-header">
            <span class="cas-league">${match.league || ""}</span>
            <span class="cas-badge ${sc}">
              ${isLive ? '<span class="cas-dot"></span>' : ""}${sl}
            </span>
          </div>
          <div class="cas-scoreline">
            <div class="cas-team cas-team-home">
              <span class="cas-team-name">${match.home_team}</span>
            </div>
            <div class="cas-score">
              <span class="cas-score-home">${match.home_score}</span>
              <span class="cas-score-sep">:</span>
              <span class="cas-score-away">${match.away_score}</span>
            </div>
            <div class="cas-team cas-team-away">
              <span class="cas-team-name">${match.away_team}</span>
            </div>
          </div>
        </div>`;
    }

    function render(data) {
      const el = document.getElementById("cas-livescore");
      if (!el) return;
      if (!data || !data.matches || !data.matches.length) {
        el.innerHTML = '<div class="cas-empty">Check back on match days for live scores!</div>';
        return;
      }
      const updated = data.last_updated
        ? new Date(data.last_updated).toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit" })
        : "";
      el.innerHTML = `
        <div class="cas-widget">
          <div class="cas-widget-header">
            <span class="cas-widget-title">⚽ Cardiff All Stars — Live Scores</span>
            ${updated ? `<span class="cas-updated">Updated: ${updated}</span>` : ""}
          </div>
          ${data.matches.map(renderMatch).join("")}
        </div>`;
    }

    async function fetchScores() {
      try {
        const r = await fetch(GIST_URL + "?t=" + Date.now());
        if (!r.ok) throw new Error("HTTP " + r.status);
        render(await r.json());
      } catch(e) {
        console.warn("Live scores fetch failed:", e.message);
      }
    }

    fetchScores();
    setInterval(fetchScores, POLL_MS);
  </script>
</body>
</html>
