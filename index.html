<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cardiff All Stars FC — Live Scores</title>
<style>
body {
  margin: 0;
  background: transparent;
  font-family: 'Segoe UI', Arial, sans-serif;
}

/* Widget styles */
.cas-widget {
  max-width: 900px;
  margin: 0 auto;
  border-radius: 12px;
  overflow: hidden;
  background: #2b1e0f; /* dark background for orange theme */
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}

.cas-widget-header {
  display: flex;
  justify-content: space-between;
  padding: 14px 20px;
  background: #2b1e0f;
  border-bottom: 2px solid #ff9c3b;
}

.cas-widget-title { font-size: 1rem; font-weight: 700; color: #ff9c3b; text-transform: uppercase; }
.cas-updated { font-size: 0.75rem; color: #ffb87a; }

.cas-league-group { margin: 10px 0; }
.cas-league-title {
  font-size: 0.85rem;
  font-weight: 700;
  color: #ffa347;
  padding: 6px 20px;
  text-transform: uppercase;
  background: #2b1e0f;
}

.cas-match {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid #3a2715;
  transition: background 0.2s;
}

.cas-match:hover { background: #3a2715; }
.cas-team { display: flex; align-items: center; }
.cas-team-name { font-weight: 700; color: #ffd9b3; }
.cas-score { font-size: 1.5rem; font-weight: bold; color: #fff; min-width: 80px; text-align: center; }

.cas-badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 20px; font-weight: bold; display: inline-flex; align-items: center; gap: 4px; }
.cas-badge.cas-live { background: rgba(255,156,59,0.15); color: #ff9c3b; border: 1px solid #ff9c3400; }
.cas-badge.cas-ft { background: rgba(255,180,100,0.1); color: #ffb84d; border: 1px solid #ffb84d40; }
.cas-badge.cas-pre { background: rgba(255,200,120,0.1); color: #ffc878; border: 1px solid #ffc87840; }

.cas-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #ff9c3b;
  animation: cas-pulse 1.4s ease-in-out infinite;
}

@keyframes cas-pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

.cas-empty { padding: 28px; text-align: center; color: #ffb87a; font-size: 0.9rem; }

@media (max-width: 520px) {
  .cas-score { font-size: 1.2rem; min-width: 60px; }
  .cas-team-name { font-size: 0.82rem; }
}
</style>
</head>
<body>
  <div id="cas-livescore"></div>

  <script>
    // ⬇️ Replace this with your Gist raw URL
    const GIST_URL = "https://gist.githubusercontent.com/chunkehdemunkeh-afk/250ca7f539145a1ae3deae88cb5f360e/raw/f0c3d8b64060b3aa2387158cb79c65a211481f5e/scores.json";
    const POLL_MS  = 60000;

    const STATUS_LABELS  = { LIVE: "LIVE", FT: "Full Time", "PRE-MATCH": "Pre-Match" };
    const STATUS_CLASSES = { LIVE: "cas-live", FT: "cas-ft", "PRE-MATCH": "cas-pre" };

    function renderMatch(match) {
      const sc = STATUS_CLASSES[match.status] || "cas-ft";
      const sl = STATUS_LABELS[match.status]  || match.status;
      const isLive = match.status === "LIVE";
      return `
        <div class="cas-match ${sc}">
          <div class="cas-match-header">
            <span class="cas-league">${match.league || ""}</span>
            <span class="cas-badge ${sc}">
              ${isLive ? '<span class="cas-dot"></span>' : ""}${sl}
            </span>
          </div>
          <div class="cas-scoreline">
            <div class="cas-team cas-team-home">
              <span class="cas-team-name">${match.home_team}</span>
            </div>
            <div class="cas-score">
              <span class="cas-score-home">${match.home_score}</span>
              <span class="cas-score-sep">:</span>
              <span class="cas-score-away">${match.away_score}</span>
            </div>
            <div class="cas-team cas-team-away">
              <span class="cas-team-name">${match.away_team}</span>
            </div>
          </div>
        </div>`;
    }

    function render(data) {
      const el = document.getElementById("cas-livescore");
      if (!el) return;
      if (!data || !data.matches || !data.matches.length) {
        el.innerHTML = '<div class="cas-empty">Check back on match days for live scores!</div>';
        return;
      }
      const updated = data.last_updated
        ? new Date(data.last_updated).toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit" })
        : "";
      el.innerHTML = `
        <div class="cas-widget">
          <div class="cas-widget-header">
            <span class="cas-widget-title">⚽ Cardiff All Stars — Live Scores</span>
            ${updated ? `<span class="cas-updated">Updated: ${updated}</span>` : ""}
          </div>
          ${data.matches.map(renderMatch).join("")}
        </div>`;
    }

    async function fetchScores() {
      try {
        const r = await fetch(GIST_URL + "?t=" + Date.now());
        if (!r.ok) throw new Error("HTTP " + r.status);
        render(await r.json());
      } catch(e) {
        console.warn("Live scores fetch failed:", e.message);
      }
    }

    fetchScores();
    setInterval(fetchScores, POLL_MS);
  </script>
</body>
</html>
